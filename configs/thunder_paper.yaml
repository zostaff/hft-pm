# Example paper-trade config: single-token feed on a mid-priced sports market.
# Replace the token_id with your own; the rest stays the same for a typical
# 0.01-tick Polymarket sports book. Strategy is the ConstantSpread baseline
# because it's the most defensible thing to live-paper before you calibrate.

market:
  token_id: "REPLACE_WITH_YOUR_TOKEN_ID"
  fee_category: SPORTS
  tick: 0.01

strategy:
  kind: constant_spread
  params:
    half_spread: 0.01     # 1 tick from mid
    size: 1

risk:
  max_drawdown_pct: 0.20
  max_inventory: 50
  # 30 s default fits multi-token capture (any of N busy tokens keeps the
  # feed alive). Paper-trade subscribes to ONE token, so the kill-switch
  # heartbeat halts the runner whenever the strategy's own token is quiet
  # — even if the underlying WS is healthy. Tune up for low-velocity
  # markets; truly-dead WS still gets caught by the websockets library's
  # ping_interval=15 / ping_timeout=10, which fires regardless of flow.
  heartbeat_timeout_s: 1800
  daily_loss_limit: 25
  baseline_capital: 100
